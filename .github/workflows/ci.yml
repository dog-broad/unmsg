name: CI

on:
  push:
    branches: [main, keystone]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Linux system deps (Qt offscreen + cairo for the pdf extra)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 \
            libcairo2-dev pkg-config

      - name: Install macOS cairo (for the pdf extra)
        if: runner.os == 'macOS'
        run: brew install cairo pkg-config

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,pdf,dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Types (core, strict)
        run: mypy src/unmsg/core

      - name: Import contracts
        run: lint-imports

      - name: Tests + coverage
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --cov=unmsg --cov-report=term --cov-report=xml
