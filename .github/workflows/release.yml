name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  windows-installer:
    name: Build Windows installer (unsigned)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,pdf]" pyinstaller

      - name: Build app with PyInstaller
        run: pyinstaller installer/windows/pyinstaller.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $ver = (python -c "from unmsg._version import __version__; print(__version__)").Trim()
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$ver installer/windows/installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*.exe

  release:
    name: Publish release
    needs: [wheel, windows-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach artifacts to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dist/*
            artifacts/windows-installer/*
          fail_on_unmatched_files: true
          generate_release_notes: true
